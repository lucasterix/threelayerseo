services:
  db:
    image: postgres:16-alpine
    container_name: threelayerseo-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: threelayerseo-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks: [internal]

  admin:
    image: ${APP_IMAGE}
    container_name: threelayerseo-admin
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./secrets:/run/secrets:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips=*
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_started}
    networks: [internal, proxy]

  renderer:
    image: ${APP_IMAGE}
    container_name: threelayerseo-renderer
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./secrets:/run/secrets:ro
      - images_data:/srv/app/images:ro
    command: uvicorn app.renderer:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips=*
    depends_on:
      db: {condition: service_healthy}
    networks: [internal, proxy]

  worker:
    image: ${APP_IMAGE}
    container_name: threelayerseo-worker
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./secrets:/run/secrets:ro
      - images_data:/srv/app/images
    command: python -m app.worker
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_started}
    networks: [internal]

volumes:
  db_data:
  redis_data:
  images_data:

networks:
  internal:
  proxy:
    external: true
    name: caddy_proxy
