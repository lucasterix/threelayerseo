name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        id: meta
        run: |
          repo="${IMAGE,,}"
          tag="${{ github.sha }}"
          echo "tags=${repo}:${tag}" >>"$GITHUB_OUTPUT"
          echo "repo=${repo}" >>"$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ steps.meta.outputs.repo }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 46.224.7.46 >> ~/.ssh/known_hosts

      - name: Sync deploy files to host
        run: |
          rsync -az --delete \
            deploy/docker-compose.prod.yml deploy/scripts/ deploy/nginx/ \
            -e "ssh -i ~/.ssh/id_ed25519" \
            deploy@46.224.7.46:~/apps/threelayerseo/ \
            || true
          # rsync with mixed sources/dirs is fragile — do it explicitly:
          scp -i ~/.ssh/id_ed25519 deploy/docker-compose.prod.yml deploy@46.224.7.46:~/apps/threelayerseo/
          scp -i ~/.ssh/id_ed25519 deploy/scripts/deploy.sh deploy@46.224.7.46:~/apps/threelayerseo/

      - name: Deploy on host
        env:
          APP_IMAGE: ${{ needs.build.outputs.image }}
        run: |
          ssh -i ~/.ssh/id_ed25519 deploy@46.224.7.46 \
            "cd ~/apps/threelayerseo && \
             APP_IMAGE='${APP_IMAGE}' \
             GHCR_USER='${{ github.actor }}' \
             GHCR_TOKEN='${{ secrets.GHCR_READ_TOKEN }}' \
             bash deploy.sh"
