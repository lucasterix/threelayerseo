name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        id: meta
        run: |
          repo="${IMAGE,,}"
          tag="${{ github.sha }}"
          echo "tags=${repo}:${tag}" >>"$GITHUB_OUTPUT"
          echo "repo=${repo}" >>"$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ steps.meta.outputs.repo }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Trust host key
        run: ssh-keyscan -H 46.224.7.46 >> ~/.ssh/known_hosts

      - name: Sync deploy files to host
        run: |
          ssh deploy@46.224.7.46 'mkdir -p ~/apps/threelayerseo ~/infra/caddy/conf.d'
          scp deploy/docker-compose.prod.yml deploy@46.224.7.46:~/apps/threelayerseo/docker-compose.yml
          scp deploy/scripts/deploy.sh       deploy@46.224.7.46:~/apps/threelayerseo/deploy.sh
          scp deploy/nginx/seo.zdkg.de.caddy deploy@46.224.7.46:~/infra/caddy/conf.d/seo.zdkg.de.caddy

      - name: Deploy on host
        env:
          APP_IMAGE: ${{ needs.build.outputs.image }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: |
          ssh deploy@46.224.7.46 \
            "cd ~/apps/threelayerseo && \
             export APP_IMAGE='${APP_IMAGE}' GHCR_USER='${GHCR_USER}' GHCR_TOKEN='${GHCR_TOKEN}' && \
             bash deploy.sh"
