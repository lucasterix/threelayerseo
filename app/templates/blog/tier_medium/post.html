<!doctype html>
<html lang="{{ site.language }}">
<head>
  <meta charset="utf-8">
  <title>{{ post.title }} · {{ site.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{font-family:Georgia,serif;max-width:760px;margin:0 auto;padding:2rem 1.2rem;color:#222;background:#fafafa;line-height:1.6}
    a{color:#c0392b}h1{margin-bottom:.6rem}
    .hero{width:100%;height:auto;border-radius:3px;margin:1rem 0 1.6rem}
    footer{margin-top:3rem;padding-top:1rem;border-top:1px solid #ddd;color:#888;font-size:.85rem}
  </style>
</head>
<body>
  <p><a href="/">&larr; {{ site.title }}</a></p>
  <h1>{{ post.title }}</h1>
  {% if post.featured_image_path %}
  <img class="hero" src="/media/{{ post.featured_image_path }}" alt="{{ post.title }}">
  {% endif %}
  <article>{{ post.body_html | safe }}</article>
  <footer>
    <a href="/impressum">Impressum</a> · <a href="/datenschutz">Datenschutz</a>
  </footer>
</body>
</html>
