<!doctype html>
<html lang="{{ site.language }}">
<head>
  <meta charset="utf-8">
  <title>{{ post.title }} · {{ site.title }}</title>
  <meta name="description" content="{{ post.meta_description or post.title }}">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="canonical" href="https://{{ request.url.hostname }}/{{ post.slug }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="/rss.xml">
  <meta property="og:type" content="article">
  <meta property="og:title" content="{{ post.title }}">
  <meta property="og:description" content="{{ post.meta_description or '' }}">
  <meta property="og:url" content="https://{{ request.url.hostname }}/{{ post.slug }}">
  <meta property="og:site_name" content="{{ site.title }}">
  {% if post.featured_image_path %}
  <meta property="og:image" content="https://{{ request.url.hostname }}/media/{{ post.featured_image_path }}">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://{{ request.url.hostname }}/media/{{ post.featured_image_path }}">
  {% endif %}
  <meta name="twitter:title" content="{{ post.title }}">
  <meta name="twitter:description" content="{{ post.meta_description or '' }}">
  {% if post.schema_json %}
  <script type="application/ld+json">{{ post.schema_json | tojson }}</script>
  {% endif %}
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-slate-900 antialiased">
  <header class="max-w-3xl mx-auto px-6 py-6 border-b">
    <a class="text-sky-700 text-sm" href="/">&larr; {{ site.title }}</a>
  </header>
  {% if post.featured_image_path %}
  <figure class="max-w-4xl mx-auto px-6 mt-6">
    <img src="/media/{{ post.featured_image_path }}" alt="{{ post.title }}"
         class="w-full rounded-lg">
  </figure>
  {% endif %}
  <main class="max-w-3xl mx-auto px-6 py-8 prose prose-slate">
    <h1>{{ post.title }}</h1>
    {{ post.body_html | safe }}
  </main>
  <footer class="max-w-3xl mx-auto px-6 py-8 border-t text-sm text-slate-500">
    <a class="hover:text-slate-900" href="/impressum">Impressum</a>
    ·
    <a class="hover:text-slate-900" href="/datenschutz">Datenschutz</a>
    ·
    <a class="hover:text-slate-900" href="/rss.xml">RSS</a>
  </footer>
</body>
</html>
