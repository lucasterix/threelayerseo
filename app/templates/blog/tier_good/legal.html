<!doctype html>
<html lang="{{ site.language }}">
<head>
  <meta charset="utf-8">
  <title>{{ title }} · {{ site.title }}</title>
  <meta name="robots" content="noindex,follow">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.tailwindcss.com"></script>
  {% if site.custom_css %}<style>{{ site.custom_css | safe }}</style>{% endif %}
</head>
<body class="bg-white text-slate-900 antialiased">
  <header class="max-w-3xl mx-auto px-6 py-6 border-b">
    <a class="text-sky-700 text-sm" href="/">&larr; {{ site.title }}</a>
  </header>
  <main class="max-w-3xl mx-auto px-6 py-10 prose prose-slate">
    {{ body_html | safe }}
  </main>
  <footer class="max-w-3xl mx-auto px-6 py-6 border-t text-sm text-slate-500">
    <a class="hover:text-slate-900" href="/impressum">Impressum</a>
    ·
    <a class="hover:text-slate-900" href="/datenschutz">Datenschutz</a>
  </footer>
</body>
</html>
