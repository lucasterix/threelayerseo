<!doctype html>
<html lang="{{ site.language }}">
<head>
  <meta charset="utf-8">
  <title>{{ post.title }} · {{ site.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{font-family:Arial,sans-serif;max-width:720px;margin:2rem auto;padding:0 1rem;color:#333;line-height:1.55}
    a{color:#06c}h1{font-size:1.7rem}
    .hero{width:100%;height:auto;border-radius:2px;margin:1rem 0}
    footer{margin-top:3rem;padding-top:1rem;border-top:1px solid #ccc;color:#888;font-size:.85rem}
  </style>
</head>
<body>
  <p><a href="/">&larr; {{ site.title }}</a></p>
  <h1>{{ post.title }}</h1>
  {% if post.featured_image_path %}
  <img class="hero" src="/media/{{ post.featured_image_path }}" alt="{{ post.title }}">
  {% endif %}
  <article>{{ post.body_html | safe }}</article>
  <footer>
    <a href="/impressum">Impressum</a> · <a href="/datenschutz">Datenschutz</a>
  </footer>
</body>
</html>
