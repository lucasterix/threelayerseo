<!doctype html>
<html lang="{{ site.language }}">
<head>
  <meta charset="utf-8">
  <title>{{ site.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{font-family:Arial,sans-serif;max-width:720px;margin:2rem auto;padding:0 1rem;color:#333;line-height:1.55}
    a{color:#06c}h1{font-size:1.6rem;margin-bottom:.4rem}h2{font-size:1.2rem;margin-top:1.8rem}
    ul{padding-left:1.2rem}.hp{border-bottom:1px solid #ddd;padding-bottom:1rem;margin-bottom:1.2rem}
    footer{margin-top:3rem;padding-top:1rem;border-top:1px solid #ccc;color:#888;font-size:.85rem}
    .post-list li{list-style:none;padding:.3rem 0;display:flex;gap:.8rem;align-items:flex-start}
    .post-list img{width:60px;height:60px;object-fit:cover;border-radius:2px;flex-shrink:0}
  </style>
</head>
<body>
  {% if site.homepage_html %}
  <section class="hp">{{ site.homepage_html | safe }}</section>
  {% else %}
  <h1>{{ site.title }}</h1>
  <p>{{ site.topic }}</p>
  {% endif %}
  <h2>Beiträge</h2>
  <ul class="post-list">
    {% for p in posts %}
    <li>
      {% if p.featured_image_path %}
      <img src="/media/{{ p.featured_image_path }}" alt="">
      {% endif %}
      <a href="/{{ p.slug }}">{{ p.title }}</a>
    </li>
    {% endfor %}
  </ul>
  <footer>
    <a href="/impressum">Impressum</a> · <a href="/datenschutz">Datenschutz</a>
  </footer>
</body>
</html>
