<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ThreeLayerSEO{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
  <nav class="bg-slate-900 text-slate-100">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center gap-6">
      <a href="/" class="font-semibold">ThreeLayerSEO</a>
      <a href="/" class="text-slate-300 hover:text-white">Dashboard</a>
      <a href="/domains" class="text-slate-300 hover:text-white">Domains</a>
      <a href="/domains/search" class="text-slate-300 hover:text-white">Kaufen</a>
      <a href="/sites" class="text-slate-300 hover:text-white">Sites</a>
      <span class="ml-auto text-sm text-slate-400">{% block header_right %}{% endblock %}</span>
    </div>
  </nav>
  <main class="max-w-6xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
