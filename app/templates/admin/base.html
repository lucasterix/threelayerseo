<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ThreeLayerSEO{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
  <nav class="bg-slate-900 text-slate-100">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center gap-4 flex-wrap">
      <a href="/" class="font-semibold">ThreeLayerSEO</a>
      <a href="/" class="text-slate-300 hover:text-white">Dashboard</a>

      <div class="relative group">
        <button class="text-slate-300 hover:text-white py-1">Research ▾</button>
        <div class="absolute left-0 top-full bg-white text-slate-900 rounded shadow-lg py-1 min-w-[200px] opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all z-50">
          <a href="/research" class="block px-4 py-2 text-sm hover:bg-slate-100">✨ Auto-Research</a>
          <div class="border-t my-1"></div>
          <a href="/keywords" class="block px-4 py-2 text-sm hover:bg-slate-100">Keywords (Volumes)</a>
          <a href="/keywords/cluster" class="block px-4 py-2 text-sm hover:bg-slate-100">Cluster</a>
          <a href="/keywords/serp" class="block px-4 py-2 text-sm hover:bg-slate-100">SERP-Analyse</a>
        </div>
      </div>

      <div class="relative group">
        <button class="text-slate-300 hover:text-white py-1">Domains ▾</button>
        <div class="absolute left-0 top-full bg-white text-slate-900 rounded shadow-lg py-1 min-w-[200px] opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all z-50">
          <a href="/domains" class="block px-4 py-2 text-sm hover:bg-slate-100">Portfolio</a>
          <a href="/domains/search" class="block px-4 py-2 text-sm hover:bg-slate-100">Kaufen (Liste)</a>
          <a href="/expired" class="block px-4 py-2 text-sm hover:bg-slate-100">Expired-Finder</a>
          <a href="/domains/evaluate" class="block px-4 py-2 text-sm hover:bg-slate-100">Category-Eval</a>
        </div>
      </div>

      <a href="/sites" class="text-slate-300 hover:text-white">Sites</a>
      <a href="/calendar" class="text-slate-300 hover:text-white">Calendar</a>
      <a href="/interlink" class="text-slate-300 hover:text-white">Interlink</a>

      <div class="relative group">
        <button class="text-slate-300 hover:text-white py-1">Infra ▾</button>
        <div class="absolute left-0 top-full bg-white text-slate-900 rounded shadow-lg py-1 min-w-[200px] opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all z-50">
          <a href="/servers" class="block px-4 py-2 text-sm hover:bg-slate-100">Server</a>
          <a href="/footprint" class="block px-4 py-2 text-sm hover:bg-slate-100">Footprint</a>
          <a href="/budget" class="block px-4 py-2 text-sm hover:bg-slate-100">Budget</a>
          <a href="/integrations" class="block px-4 py-2 text-sm hover:bg-slate-100">Integrations</a>
        </div>
      </div>

      <span class="ml-auto text-sm text-slate-400">{% block header_right %}{% endblock %}</span>
    </div>
  </nav>
  <main class="max-w-7xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>
  <span class="hidden bg-emerald-100 text-emerald-800 border-emerald-300 bg-teal-100 text-teal-800 border-teal-300 bg-cyan-100 text-cyan-800 border-cyan-300 bg-sky-100 text-sky-800 border-sky-300 bg-lime-100 text-lime-800 border-lime-300 bg-amber-100 text-amber-800 border-amber-300 bg-violet-100 text-violet-800 border-violet-300 bg-indigo-100 text-indigo-800 border-indigo-300 bg-slate-100 text-slate-800 border-slate-300 bg-blue-100 text-blue-800 border-blue-300 bg-rose-100 text-rose-800 border-rose-300 bg-pink-100 text-pink-800 border-pink-300 bg-gray-100 text-gray-800 border-gray-300"></span>
</body>
</html>
